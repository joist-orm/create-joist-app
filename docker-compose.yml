services:
  db:
    build:
      context: .
      dockerfile: db.dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: joist
      POSTGRES_PASSWORD: local
      POSTGRES_DB: joist_dev
    command: ["postgres", "-c", "fsync=off", "-c", "log_statement=all"]
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joist -d joist_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
